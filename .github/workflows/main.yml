# This is a basic workflow to help you get started with Actions

name: Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    steps:
       
      - uses: actions/checkout@v2
      - name: Add environment variables to .env
        run: |
          echo LINE_TOKEN=${{ secrets.LINE_TOKEN }} >> .env
          echo LINE_MESSAGING_API=${{ secrets.LINE_MESSAGING_API }} >> .env
          echo PORT=${{ secrets.PORT }} >> .env
      - name: Git pull request && Create Dokcer Container
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.TUNNEL_HOST }}
          username: ${{ secrets.TUNNEL_USERNAME }}
          key: ${{ secrets.ID_ED25519 }}
          passphrase: ${{ secrets.PASSPHRASE }}
          port: ${{ secrets.TUNNEL_PORT }}
          script: |
            cd ${{ secrets.PATH_REPO }} && git pull
            docker rm -f server
            docker-compose up -d 